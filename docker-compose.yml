version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - neo4j
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/intelligence
    ports:
      - "7474:7474"
      - "7687:7687"
  ui:
    image: node:20-alpine
    working_dir: /app/ui_v2
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    depends_on:
      - api
