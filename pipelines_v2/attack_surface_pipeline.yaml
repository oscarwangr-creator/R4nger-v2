name: attack_surface_pipeline
description: attack_surface_pipeline pipeline for Intelligence OS v2
entrypoint: value
stages:
- name: collection
  tools:
  - exposed_service_discovery
  parallel: true
  transforms:
  - flatten_result
- name: enrichment
  tools:
  - subdomain_enum
  - port_scan
  parallel: true
  transforms:
  - deduplicate_entities
outputs:
- entities
- relationships
- evidence
graph_relationships:
- source: entity
  target: entity
  relation: RELATED_TO
