name: credential_pipeline
description: credential_pipeline pipeline for Intelligence OS v2
entrypoint: value
stages:
- name: collection
  tools:
  - credential_strength
  parallel: true
  transforms:
  - flatten_result
- name: enrichment
  tools:
  - password_reuse_detector
  parallel: true
  transforms:
  - deduplicate_entities
outputs:
- entities
- relationships
- evidence
graph_relationships:
- source: entity
  target: entity
  relation: RELATED_TO
