apiVersion: apps/v1
kind: Deployment
metadata:
  name: intelligence-api
  namespace: intelligence-os
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intelligence-api
  template:
    metadata:
      labels:
        app: intelligence-api
    spec:
      containers:
      - name: api
        image: intelligence-os-api:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: intelligence-api
  namespace: intelligence-os
spec:
  selector:
    app: intelligence-api
  ports:
  - port: 8000
    targetPort: 8000
