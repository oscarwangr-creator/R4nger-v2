name: credential_reuse_pipeline
purpose: Track reused credentials across breaches, repositories, and exposed services.
input:
  types:
  - email
  - domain
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: dehashed
  tool: dehashed
  input:
    email: email
  required: true
- name: discovery
  module: hibp
  tool: hibp
  input:
    email: email
  required: true
- name: verification
  module: trufflehog
  tool: trufflehog
  input:
    email: email
  required: false
- name: pivot_expansion
  module: nmap
  tool: nmap
  input:
    email: email
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: email
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: email
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: email
  required: false
- name: entity_resolution
  module: entity-resolution
  tool: entity-resolution
  input:
    seed: email
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
