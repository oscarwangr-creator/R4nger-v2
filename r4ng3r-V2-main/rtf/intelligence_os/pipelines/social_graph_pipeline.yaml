name: social_graph_pipeline
purpose: Map social accounts, followers, hashtags, and linked content across networks.
input:
  types:
  - username
  - keyword
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: snscrape
  tool: snscrape
  input:
    username: username
  required: true
- name: discovery
  module: twint
  tool: twint
  input:
    username: username
  required: true
- name: verification
  module: instaloader
  tool: instaloader
  input:
    username: username
  required: false
- name: pivot_expansion
  module: toutatis
  tool: toutatis
  input:
    username: username
  required: false
- name: correlation
  module: reddit-user-analyser
  tool: reddit-user-analyser
  input:
    username: username
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: username
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: username
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: username
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
