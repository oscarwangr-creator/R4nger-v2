name: username_intelligence_pipeline
purpose: Discover accounts, aliases, linked repositories, and social presence from
  a username seed.
input:
  types:
  - username
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: sherlock
  tool: sherlock
  input:
    username: username
  required: true
- name: discovery
  module: maigret
  tool: maigret
  input:
    username: username
  required: true
- name: verification
  module: blackbird
  tool: blackbird
  input:
    username: username
  required: false
- name: pivot_expansion
  module: snscrape
  tool: snscrape
  input:
    username: username
  required: false
- name: correlation
  module: gitfive
  tool: gitfive
  input:
    username: username
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: username
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: username
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: username
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
