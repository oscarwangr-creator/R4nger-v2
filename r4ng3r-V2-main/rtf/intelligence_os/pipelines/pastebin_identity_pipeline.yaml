name: pastebin_identity_pipeline
purpose: Expanded social media intelligence workflow for pastebin identity pipeline.
input:
  types:
  - keyword
  - domain
  - username
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: snscrape
  tool: snscrape
  input:
    keyword: keyword
  required: true
- name: discovery
  module: twint
  tool: twint
  input:
    keyword: keyword
  required: true
- name: verification
  module: instaloader
  tool: instaloader
  input:
    keyword: keyword
  required: false
- name: pivot_expansion
  module: toutatis
  tool: toutatis
  input:
    keyword: keyword
  required: false
- name: correlation
  module: osintgram
  tool: osintgram
  input:
    keyword: keyword
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: keyword
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: keyword
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: keyword
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
