name: satellite_context_pipeline
purpose: Blend geospatial search, imagery, facilities, and ownership intelligence.
input:
  types:
  - location
  - organization
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: sentinel-hub
  tool: sentinel-hub
  input:
    location: location
  required: true
- name: discovery
  module: openstreetmap
  tool: openstreetmap
  input:
    location: location
  required: true
- name: verification
  module: wikimapia
  tool: wikimapia
  input:
    location: location
  required: false
- name: pivot_expansion
  module: shodan
  tool: shodan
  input:
    location: location
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: location
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: location
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: location
  required: false
- name: entity_resolution
  module: entity-resolution
  tool: entity-resolution
  input:
    seed: location
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
