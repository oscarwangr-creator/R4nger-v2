name: domain_infrastructure_pipeline
purpose: Enumerate subdomains, services, technologies, and attack surface from a domain.
input:
  types:
  - domain
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: amass
  tool: amass
  input:
    domain: domain
  required: true
- name: discovery
  module: subfinder
  tool: subfinder
  input:
    domain: domain
  required: true
- name: verification
  module: httpx
  tool: httpx
  input:
    domain: domain
  required: false
- name: pivot_expansion
  module: nmap
  tool: nmap
  input:
    domain: domain
  required: false
- name: correlation
  module: nuclei
  tool: nuclei
  input:
    domain: domain
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: domain
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: domain
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: domain
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
