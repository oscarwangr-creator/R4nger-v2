name: executive_watch_pipeline
purpose: Track executives through identity, travel, social, and infrastructure overlap.
input:
  types:
  - real_name
  - username
  - email
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: sherlock
  tool: sherlock
  input:
    real_name: real_name
  required: true
- name: discovery
  module: snscrape
  tool: snscrape
  input:
    real_name: real_name
  required: true
- name: verification
  module: ghunt
  tool: ghunt
  input:
    real_name: real_name
  required: false
- name: pivot_expansion
  module: dehashed
  tool: dehashed
  input:
    real_name: real_name
  required: false
- name: correlation
  module: amass
  tool: amass
  input:
    real_name: real_name
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: real_name
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: real_name
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: real_name
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
