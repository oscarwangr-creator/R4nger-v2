name: email_intelligence_pipeline
purpose: Enrich an email address into accounts, breaches, domains, and organization
  context.
input:
  types:
  - email
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: holehe
  tool: holehe
  input:
    email: email
  required: true
- name: discovery
  module: emailrep
  tool: emailrep
  input:
    email: email
  required: true
- name: verification
  module: hibp
  tool: hibp
  input:
    email: email
  required: false
- name: pivot_expansion
  module: dehashed
  tool: dehashed
  input:
    email: email
  required: false
- name: correlation
  module: theharvester
  tool: theharvester
  input:
    email: email
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: email
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: email
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: email
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
