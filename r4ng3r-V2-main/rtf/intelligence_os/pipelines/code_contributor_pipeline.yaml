name: code_contributor_pipeline
purpose: Analyze contributors, commit metadata, emails, and repo ownership relationships.
input:
  types:
  - repository
  - username
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: gitfive
  tool: gitfive
  input:
    repository: repository
  required: true
- name: discovery
  module: github-search
  tool: github-search
  input:
    repository: repository
  required: true
- name: verification
  module: trufflehog
  tool: trufflehog
  input:
    repository: repository
  required: false
- name: pivot_expansion
  module: gitleaks
  tool: gitleaks
  input:
    repository: repository
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: repository
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: repository
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: repository
  required: false
- name: entity_resolution
  module: entity-resolution
  tool: entity-resolution
  input:
    seed: repository
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
