name: chat_server_pipeline
purpose: Expanded infrastructure attack surface workflow for chat server pipeline.
input:
  types:
  - keyword
  - domain
  - username
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: naabu
  tool: naabu
  input:
    keyword: keyword
  required: true
- name: discovery
  module: nmap
  tool: nmap
  input:
    keyword: keyword
  required: true
- name: verification
  module: masscan
  tool: masscan
  input:
    keyword: keyword
  required: false
- name: pivot_expansion
  module: httpx
  tool: httpx
  input:
    keyword: keyword
  required: false
- name: correlation
  module: nuclei
  tool: nuclei
  input:
    keyword: keyword
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: keyword
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: keyword
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: keyword
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
