name: document_intelligence_pipeline
input:
  type: domain
stages:
- module: metagoofil
  input:
    domain: domain
  required: false
- module: exiftool
  input:
    file: file
  required: false
- name: entity_resolution
  module: entity-resolution
  tool: entity-resolution
  input:
    seed: domain
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: domain
  required: false
- name: risk_scoring
  module: risk-scoring
  tool: risk-scoring
  input:
    seed: domain
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: domain
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: domain
  required: false
- name: evidence_normalization
  module: evidence-normalization
  tool: evidence-normalization
  input:
    seed: domain
  required: false
output:
  entities:
  - documents
  - metadata
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - triage extracted entities
  - queue recursive pivots
  - publish graph update
  - generate analyst report
graph:
  relationships:
  - domain -> document
  - document -> metadata
purpose: Autonomous intelligence pipeline for document intelligence pipeline.
recursive_pivoting: true
ai_assisted: true
