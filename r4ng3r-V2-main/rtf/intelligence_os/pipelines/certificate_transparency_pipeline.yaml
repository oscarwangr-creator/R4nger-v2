name: certificate_transparency_pipeline
purpose: Expanded phone intelligence workflow for certificate transparency pipeline.
input:
  types:
  - keyword
  - domain
  - username
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: phoneinfoga
  tool: phoneinfoga
  input:
    keyword: keyword
  required: true
- name: discovery
  module: numverify
  tool: numverify
  input:
    keyword: keyword
  required: true
- name: verification
  module: whocalld
  tool: whocalld
  input:
    keyword: keyword
  required: false
- name: pivot_expansion
  module: truecaller
  tool: truecaller
  input:
    keyword: keyword
  required: false
- name: correlation
  module: osintcombine
  tool: osintcombine
  input:
    keyword: keyword
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: keyword
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: keyword
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: keyword
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
