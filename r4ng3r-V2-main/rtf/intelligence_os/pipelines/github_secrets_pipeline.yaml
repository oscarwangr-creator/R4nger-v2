name: github_secrets_pipeline
purpose: Inspect repositories, contributors, commits, and leaked secrets tied to a
  user or org.
input:
  types:
  - username
  - organization
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: gitfive
  tool: gitfive
  input:
    username: username
  required: true
- name: discovery
  module: trufflehog
  tool: trufflehog
  input:
    username: username
  required: true
- name: verification
  module: gitleaks
  tool: gitleaks
  input:
    username: username
  required: false
- name: pivot_expansion
  module: github-search
  tool: github-search
  input:
    username: username
  required: false
- name: correlation
  module: semgrep
  tool: semgrep
  input:
    username: username
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: username
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: username
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: username
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
