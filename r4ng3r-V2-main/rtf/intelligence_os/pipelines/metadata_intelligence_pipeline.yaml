name: metadata_intelligence_pipeline
purpose: Extract metadata, authoring traces, GPS clues, and file lineage from evidence.
input:
  types:
  - file
  - image_url
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: exiftool
  tool: exiftool
  input:
    file: file
  required: true
- name: discovery
  module: mat2
  tool: mat2
  input:
    file: file
  required: true
- name: verification
  module: foca
  tool: foca
  input:
    file: file
  required: false
- name: pivot_expansion
  module: metagoofil
  tool: metagoofil
  input:
    file: file
  required: false
- name: correlation
  module: ghunt
  tool: ghunt
  input:
    file: file
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: file
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: file
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: file
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
