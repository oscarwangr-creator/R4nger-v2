name: organization_profiling_pipeline
purpose: Profile an organization through employees, domains, breaches, infra, and
  code footprints.
input:
  types:
  - organization
  - domain
recursive_pivoting: true
ai_assisted: true
stages:
- name: seed_normalization
  module: theharvester
  tool: theharvester
  input:
    organization: organization
  required: true
- name: discovery
  module: spiderfoot
  tool: spiderfoot
  input:
    organization: organization
  required: true
- name: verification
  module: amass
  tool: amass
  input:
    organization: organization
  required: false
- name: pivot_expansion
  module: securitytrails
  tool: securitytrails
  input:
    organization: organization
  required: false
- name: correlation
  module: shodan
  tool: shodan
  input:
    organization: organization
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: organization
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: organization
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: organization
  required: false
output:
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - expand linked entities
  - queue recursive pivots
  - generate analyst report
