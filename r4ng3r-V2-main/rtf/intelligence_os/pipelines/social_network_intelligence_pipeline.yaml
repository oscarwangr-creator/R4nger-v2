name: social_network_intelligence_pipeline
input:
  type: username
stages:
- module: sherlock
  input:
    username: username
- module: twint
  input:
    username: username
  required: false
- name: entity_resolution
  module: entity-resolution
  tool: entity-resolution
  input:
    seed: username
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: username
  required: false
- name: risk_scoring
  module: risk-scoring
  tool: risk-scoring
  input:
    seed: username
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: username
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: username
  required: false
- name: evidence_normalization
  module: evidence-normalization
  tool: evidence-normalization
  input:
    seed: username
  required: false
output:
  entities:
  - accounts
  - posts
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - triage extracted entities
  - queue recursive pivots
  - publish graph update
  - generate analyst report
graph:
  relationships:
  - username -> account
  - account -> account
purpose: Autonomous intelligence pipeline for social network intelligence pipeline.
recursive_pivoting: true
ai_assisted: true
