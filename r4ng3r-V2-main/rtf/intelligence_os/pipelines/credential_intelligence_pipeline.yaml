name: credential_intelligence_pipeline
input:
  type: email
stages:
- module: dehashed
  input:
    query: email
  required: false
- module: leaklookup
  input:
    query: email
  required: false
- name: entity_resolution
  module: entity-resolution
  tool: entity-resolution
  input:
    seed: email
  required: false
- name: graph_correlation
  module: neo4j-analysis
  tool: neo4j-analysis
  input:
    seed: email
  required: false
- name: risk_scoring
  module: risk-scoring
  tool: risk-scoring
  input:
    seed: email
  required: false
- name: multi_format_reporting
  module: reporting-suite
  tool: reporting-suite
  input:
    seed: email
  required: false
- name: next_step_planning
  module: investigation-planner
  tool: investigation-planner
  input:
    seed: email
  required: false
- name: evidence_normalization
  module: evidence-normalization
  tool: evidence-normalization
  input:
    seed: email
  required: false
output:
  entities:
  - credentials
  - domains
  formats:
  - json
  - csv
  - xlsx
  - pdf
  - html
  - mtgl
  next_steps:
  - triage extracted entities
  - queue recursive pivots
  - publish graph update
  - generate analyst report
graph:
  relationships:
  - email -> credential
  - credential -> domain
purpose: Autonomous intelligence pipeline for credential intelligence pipeline.
recursive_pivoting: true
ai_assisted: true
