version: "3.9"

# RTF v2.0 — Full Environment Docker Compose
# Services: RTF API, Dashboard, Neo4j, Redis, Postgres, IntelOwl
#
# Usage:
#   docker-compose up -d              # start all services
#   docker-compose up rtf-api         # start only API
#   docker-compose logs -f rtf-api    # follow logs
#   docker-compose exec rtf bash      # interactive shell

x-rtf-common: &rtf-common
  image: rtf:v2
  build:
    context: ../..
    dockerfile: tools/docker_environment/Dockerfile.full
  volumes:
    - ../..:/opt/rtf
    - rtf-data:/opt/rtf/data
    - rtf-logs:/opt/rtf/logs
    - rtf-tools:/root/redteam-lab/tools
  environment:
    - RTF_DB_PATH=/opt/rtf/data/framework.db
    - RTF_LOG_LEVEL=${RTF_LOG_LEVEL:-INFO}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    - SHODAN_API_KEY=${SHODAN_API_KEY:-}
    - NEO4J_URI=bolt://neo4j:7687
    - REDIS_URL=redis://redis:6379/0
  depends_on:
    - neo4j
    - redis
  networks:
    - rtf-net
  restart: unless-stopped

services:
  # ── RTF REST API ──────────────────────────────────────────
  rtf-api:
    <<: *rtf-common
    container_name: rtf-api
    command: python3 rtf.py api --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── RTF Web Dashboard ─────────────────────────────────────
  rtf-dashboard:
    <<: *rtf-common
    container_name: rtf-dashboard
    command: python3 rtf.py dashboard --host 0.0.0.0 --port 5000
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      - rtf-api

  # ── Neo4j (BloodHound / entity graph) ────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: rtf-neo4j
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/rtfpassword123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - rtf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis (job queue / session cache) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: rtf-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rtf-net
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  # ── PostgreSQL (optional — for large deployments) ─────────
  postgres:
    image: postgres:16-alpine
    container_name: rtf-postgres
    profiles: ["full"]
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=rtf
      - POSTGRES_USER=rtf
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rtfpassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rtf-net
    restart: unless-stopped

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rtf-nginx
    profiles: ["full"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rtf-api
      - rtf-dashboard
    networks:
      - rtf-net
    restart: unless-stopped

volumes:
  rtf-data:
  rtf-logs:
  rtf-tools:
  neo4j-data:
  neo4j-logs:
  redis-data:
  postgres-data:

networks:
  rtf-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
