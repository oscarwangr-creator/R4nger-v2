upstream rtf_api {
    server rtf-api:8000;
}

upstream rtf_dashboard {
    server rtf-dashboard:5000;
}

server {
    listen 80;
    server_name _;

    # RTF REST API
    location /api/ {
        proxy_pass         http://rtf_api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # RTF Dashboard
    location / {
        proxy_pass         http://rtf_dashboard/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
