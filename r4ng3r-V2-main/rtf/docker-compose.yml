version: "3.9"
services:
  api:
    build: .
    command: python rtf.py api --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - RTF_API_HOST=0.0.0.0
      - RTF_API_PORT=8000
      - RTF_DB_PATH=/app/data/framework.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  dashboard:
    build: .
    command: python rtf.py dashboard --host 0.0.0.0 --port 5000
    ports: ["5000:5000"]
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on: [api]
    restart: unless-stopped
  neo4j:
    image: neo4j:5.18
    ports: ["7474:7474","7687:7687"]
    environment:
      - NEO4J_AUTH=neo4j/bloodhound
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped
volumes:
  neo4j_data:
