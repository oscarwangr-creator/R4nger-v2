version: '3.9'
services:
  rtf-core:
    build: ../..
    command: ["python", "rtf.py", "api", "--host", "0.0.0.0", "--port", "8000"]
    depends_on: [redis, rabbitmq, neo4j, elasticsearch, minio]
  redis:
    image: redis:7-alpine
  rabbitmq:
    image: rabbitmq:3-management
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/rtf-titan
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
  minio:
    image: minio/minio:latest
    command: server /data
  prometheus:
    image: prom/prometheus:latest
  grafana:
    image: grafana/grafana:latest
